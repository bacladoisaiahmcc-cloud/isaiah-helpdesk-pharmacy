<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helpdesk System</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    :root {
      --oracle-blue: #234e70; 
      --bg-gray: #f4f7f9;
    }
    body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg-gray); }

    /* Header matching your screenshots */
    .header { background-color: var(--oracle-blue); color: white; padding: 35px 8%; display: flex; justify-content: space-between; align-items: center; }
    .oracle-logo { height: 25px; filter: brightness(0) invert(1); }
    .search-wrapper { position: relative; width: 300px; }
    .search-input { width: 100%; padding: 10px 15px 10px 40px; border-radius: 6px; border: none; }
    .search-icon { position: absolute; left: 12px; top: 12px; color: #888; }

    /* Main Content Layout */
    .main-content { max-width: 1000px; margin: 20px auto; padding: 20px; }
    .dropdown-card { background: white; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; }
    .dropdown-btn { width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: none; border: none; font-size: 16px; text-align: left; }
    
    /* Subtopic Styling from your HTML */
    .subtopic-btn { padding: 12px 20px 12px 40px; background: #fdfdfd; border-top: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; }
    .subtopic-body { display: none; padding: 10px 20px 10px 60px; background: #fff; }
    .pdf-list { list-style: none; padding: 0; }
    .pdf-list a { color: #0056b3; text-decoration: none; font-size: 14px; display: block; margin: 8px 0; }

    /* Admin Buttons (Bottom Left) */
    #left-buttons { position: fixed; bottom: 20px; left: 20px; display: flex; gap: 10px; }
    .admin-btn { padding: 10px 15px; border-radius: 5px; border: none; background: #444; color: white; cursor: pointer; font-size: 13px; }
    
    /* Modals */
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: white; padding: 25px; border-radius: 10px; width: 350px; position: relative; }
    .close { position: absolute; top: 10px; right: 15px; cursor: pointer; font-size: 20px; }
    .form-input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
  </style>
</head>
<body>

  <header class="header">
    <div style="display: flex; align-items: center; gap: 20px;">
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/50/Oracle_logo.svg" class="oracle-logo">
      <h2 style="font-weight: 400; margin: 0;">How can we help you today?</h2>
    </div>
    <div class="search-wrapper">
      <i class="fas fa-search search-icon"></i>
      <input type="text" id="searchInput" class="search-input" placeholder="Search...">
    </div>
  </header>

  <main class="main-content">
    <div id="dynamic-accordion">
      
      <div class="dropdown-card">
        <div class="dropdown-btn">
          <span><i class="fas fa-info-circle" style="margin-right: 10px;"></i> Working Instructions</span>
          <span class="arrow">▼</span>
        </div>
        <div class="dropdown-body" style="display:none;">
          <div class="subtopic-btn"><span>Receivables</span><span>▼</span></div>
          <div class="subtopic-body">
            <ul class="pdf-list">
              <li><a href="https://res.cloudinary.com/dkwkdsnk7/raw/upload/v1747790590/ORA-10-001_HOW_TO_LOG-IN_TO_ORACLE_1747790536384.pdf" target="_blank">ORA-10-001 HOW TO LOG-IN TO ORACLE</a></li>
            </ul>
          </div>
          <div class="subtopic-btn"><span>Payables</span><span>▼</span></div>
          <div class="subtopic-body">
            <ul class="pdf-list"><li><a href="#">Sample Payables Guide</a></li></ul>
          </div>
        </div>
      </div>

      <div class="dropdown-card">
        <div class="dropdown-btn">
          <span><i class="fas fa-project-diagram" style="margin-right: 10px;"></i> Functional Specifications</span>
          <span class="arrow">▼</span>
        </div>
        <div class="dropdown-body" style="display:none;">
           <ul class="pdf-list">
             <li><a href="https://res.cloudinary.com/dkwkdsnk7/raw/upload/v1748950949/MD050_Collection_Receipt_Form_1748950976602.pdf" target="_blank">MD050 Collection Receipt Form</a></li>
           </ul>
        </div>
      </div>

      <div class="dropdown-card">
        <div class="dropdown-btn">
          <span><i class="fas fa-file-invoice" style="margin-right: 10px;"></i> Templates</span>
          <span class="arrow">▼</span>
        </div>
        <div class="dropdown-body" style="display:none;">
           <ul class="pdf-list">
             <li><a href="https://res.cloudinary.com/dkwkdsnk7/raw/upload/v1747790838/ROSE_Cash_Advance_Liquidation_Form_V6-082023_1747790785821.xlsx" target="_blank">Cash Advance Liquidation Form</a></li>
           </ul>
        </div>
      </div>

    </div>
  </main>

  <div id="left-buttons">
    <button class="admin-btn" id="addBtn"><i class="fas fa-plus"></i> Add</button>
    <button class="admin-btn" id="adminBtn"><i class="fas fa-user-shield"></i> Admin</button>
  </div>

  <div id="loginModal" class="modal">
    <div class="modal-content">
      <span class="close" id="closeLogin">&times;</span>
      <h2>Login</h2>
      <input type="email" placeholder="Email" class="form-input">
      <input type="password" placeholder="Password" class="form-input">
      <button class="admin-btn" style="width:100%; background:var(--oracle-blue);">Login</button>
    </div>
  </div>

  <script>
    // 1. Firebase Initialization
    const firebaseConfig = {
      apiKey: "AIzaSyBaSuFhNUeghfXEznYCHxYnagkjiojfO_M",
      authDomain: "helpdeskrpharmacy.firebaseapp.com",
      databaseURL: "https://helpdeskrpharmacy-default-rtdb.firebaseio.com",
      projectId: "helpdeskrpharmacy",
      messagingSenderId: "776189919696",
      appId: "1:776189919696:web:ab3be5e265dbfff8faf9d5"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

    // 2. Accordion Logic for Main Cards
    document.querySelectorAll('.dropdown-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const body = this.nextElementSibling;
        body.style.display = body.style.display === 'none' ? 'block' : 'none';
      });
    });

    // 3. Subtopic Toggle Logic
    document.querySelectorAll('.subtopic-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const body = this.nextElementSibling;
        body.style.display = body.style.display === 'none' ? 'block' : 'none';
      });
    });

    // 4. Search Logic
    document.getElementById('searchInput').addEventListener('keyup', function() {
      let filter = this.value.toLowerCase();
      let cards = document.querySelectorAll('.dropdown-card');
      cards.forEach(card => {
        card.style.display = card.innerText.toLowerCase().includes(filter) ? "" : "none";
      });
    });

    // 5. Modal Triggers
    document.getElementById('adminBtn').onclick = () => document.getElementById('loginModal').style.display = 'flex';
    document.getElementById('closeLogin').onclick = () => document.getElementById('loginModal').style.display = 'none';
  </script>
</body>
</html>
