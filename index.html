<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oracle Pharmacy Helpdesk</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root { 
  --oracle-blue: #2c5c7c; 
  --oracle-red: #eb1000; 
  --bg: #f5f6f8; 
}

body { 
  font-family: 'Segoe UI', Tahoma, sans-serif; 
  margin: 0; 
  background-color: var(--bg); 
}

/* HEADER */
.header { 
  background-color: var(--oracle-blue); 
  color: white; 
  padding: 18px 5%; 
  display: flex; 
  justify-content: space-between; 
  align-items: center; 
}

.header-left {
  display: flex;
  align-items: center;
  gap: 15px;
}

.oracle-logo {
  height: 22px;
  filter: brightness(0) invert(1);
}

.header-title {
  font-size: 20px;
}

/* SEARCH */
.search-wrapper {
  position: relative;
  width: 260px;
}

.search-wrapper input {
  width: 100%;
  padding: 10px 12px 10px 35px;
  border-radius: 6px;
  border: none;
}

.search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: #888;
}

/* CONTAINER */
.container { 
  max-width: 950px; 
  margin: 30px auto; 
  padding: 0 15px;
}

/* CARDS */
.card {
  background: white;
  border-radius: 10px;
  margin-bottom: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  overflow: hidden;
}

.card-header {
  width: 100%;
  padding: 18px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  border: none;
  background: white;
}

.card-header:hover {
  background: #f9fafb;
}

.card-header span {
  display: flex;
  align-items: center;
  gap: 12px;
}

.arrow {
  transition: 0.3s;
}

.card-body {
  display: none;
  padding: 15px 25px;
  background: #fafafa;
}

/* SUBJECT */
.subject-section div {
  font-weight: 600;
  color: var(--oracle-blue);
  padding: 10px 0;
  border-bottom: 1px solid #ddd;
}

/* FILE */
.subject-section li {
  margin: 6px 0;
}

.delete-btn {
  margin-left: 10px;
  color: red;
  cursor: pointer;
  border: none;
  background: none;
}

/* BUTTONS */
#login-trigger {
  position: fixed;
  bottom: 25px;
  right: 25px;
  background: var(--oracle-red);
  color: white;
  padding: 12px 18px;
  border-radius: 50px;
  border: none;
  cursor: pointer;
}

#admin-toolbar {
  position: fixed;
  bottom: 80px;
  right: 25px;
  display: none;
}
</style>
</head>

<body>

<header class="header">
  <div class="header-left">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/50/Oracle_logo.svg" class="oracle-logo">
    <h1 class="header-title">How can we help you today?</h1>
  </div>

  <div class="search-wrapper">
    <i class="fas fa-search search-icon"></i>
    <input type="text" id="searchBar" placeholder="Search...">
  </div>
</header>

<button id="login-trigger">
  <i class="fas fa-user-shield"></i> ADMIN LOGIN
</button>

<div id="admin-toolbar">
  <button onclick="uploadFile()" style="padding:10px;background:black;color:white;border:none;border-radius:20px;cursor:pointer;">
    + Upload
  </button>
</div>

<main class="container" id="accordion-container">

<div class="card">
<button class="card-header"><span><i class="fas fa-book"></i> Working Instructions</span><i class="fas fa-caret-down arrow"></i></button>
<div class="card-body" id="body-Working-Instructions"></div>
</div>

<div class="card">
<button class="card-header"><span><i class="fas fa-file-alt"></i> Standard Operating Procedures</span><i class="fas fa-caret-down arrow"></i></button>
<div class="card-body" id="body-Standard-Operating-Procedures"></div>
</div>

<div class="card">
<button class="card-header"><span><i class="fas fa-layer-group"></i> Functional Specifications</span><i class="fas fa-caret-down arrow"></i></button>
<div class="card-body" id="body-Functional-Specifications"></div>
</div>

<div class="card">
<button class="card-header"><span><i class="fas fa-file"></i> Templates</span><i class="fas fa-caret-down arrow"></i></button>
<div class="card-body" id="body-Templates"></div>
</div>

</main>

<script>
// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "helpdeskrpharmacy.firebaseapp.com",
  databaseURL: "https://helpdeskrpharmacy-default-rtdb.firebaseio.com",
  projectId: "helpdeskrpharmacy",
  storageBucket: "helpdeskrpharmacy.appspot.com",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();
const storage = firebase.storage();

// LOGIN
document.getElementById('login-trigger').onclick = () => {
  if(auth.currentUser){
    auth.signOut();
    return;
  }
  const email = prompt("Email:");
  const pass = prompt("Password:");
  auth.signInWithEmailAndPassword(email, pass)
    .then(()=>alert("Login Success"))
    .catch(e=>alert(e.message));
};

// AUTH STATE
auth.onAuthStateChanged(user=>{
  document.getElementById('admin-toolbar').style.display = user ? "block" : "none";
  document.getElementById('login-trigger').innerText = user ? "LOGOUT" : "ADMIN LOGIN";
});

// UPLOAD
function uploadFile(){
  const cat = prompt("Category:");
  const sub = prompt("Subject:");

  const input = document.createElement('input');
  input.type = "file";

  input.onchange = e=>{
    const file = e.target.files[0];
    const ref = storage.ref('docs/'+Date.now()+"_"+file.name);

    ref.put(file)
    .then(s=>s.ref.getDownloadURL())
    .then(url=>{
      db.ref('files').push({
        category: cat,
        subject: sub,
        name: file.name,
        url: url
      });
    });
  };
  input.click();
}

// DELETE
function deleteFile(id){
  if(confirm("Delete?")){
    db.ref('files/'+id).remove();
  }
}

// FETCH
db.ref('files').on('value', snap=>{
  document.querySelectorAll('.card-body').forEach(b=>b.innerHTML="");

  snap.forEach(c=>{
    const d = c.val();
    const id = c.key;

    const parent = document.getElementById('body-'+d.category.replace(/\s+/g,'-'));
    if(!parent) return;

    let block = parent.querySelector(`[data-sub="${d.subject}"]`);
    if(!block){
      block = document.createElement('div');
      block.className = "subject-section";
      block.setAttribute("data-sub", d.subject);
      block.innerHTML = `<div>${d.subject}</div><ul></ul>`;
      parent.appendChild(block);
    }

    const li = document.createElement('li');
    li.innerHTML = `
      <a href="${d.url}" target="_blank">${d.name}</a>
      ${auth.currentUser ? `<button class="delete-btn" onclick="deleteFile('${id}')">Delete</button>`:''}
    `;
    block.querySelector('ul').appendChild(li);
  });
});

// ACCORDION
document.getElementById('accordion-container').addEventListener('click', e=>{
  const h = e.target.closest('.card-header');
  if(h){
    const b = h.nextElementSibling;
    const open = b.style.display==="block";
    b.style.display = open?"none":"block";
    h.querySelector('.arrow').style.transform = open?"rotate(0)":"rotate(180deg)";
  }
});

// SEARCH
document.getElementById('searchBar').onkeyup = function(){
  const q=this.value.toLowerCase();
  document.querySelectorAll('.card').forEach(c=>{
    c.style.display = c.innerText.toLowerCase().includes(q)?"block":"none";
  });
};
</script>

</body>
</html>
