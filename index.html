<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oracle Pharmacy Helpdesk</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
  --oracle-blue: #2c5c7c;
  --oracle-red: #eb1000;
  --bg: #f5f6f8;
}
body {
  font-family: 'Segoe UI', Tahoma, sans-serif;
  margin: 0;
  background-color: var(--bg);
}
.header {
  background-color: var(--oracle-blue);
  color: white;
  padding: 18px 5%;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 15px;
}
.oracle-logo {
  height: 22px;
  filter: brightness(0) invert(1);
}
.header-title {
  font-size: 20px;
  margin: 0;
}
.search-wrapper {
  position: relative;
  width: 260px;
}
.search-wrapper input {
  width: 100%;
  padding: 10px 12px 10px 35px;
  border-radius: 6px;
  border: none;
  box-sizing: border-box;
}
.search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: #888;
}
.container {
  max-width: 950px;
  margin: 30px auto;
  padding: 0 15px;
}
.card {
  background: white;
  border-radius: 10px;
  margin-bottom: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  overflow: hidden;
}
.card-header {
  width: 100%;
  padding: 18px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  border: none;
  background: white;
  font-size: 15px;
}
.card-header:hover { background: #f9fafb; }
.card-header span {
  display: flex;
  align-items: center;
  gap: 12px;
}
.arrow { transition: 0.3s; }
.card-body {
  display: none;
  padding: 15px 25px;
  background: #fafafa;
}
.subject-section div {
  font-weight: 600;
  color: var(--oracle-blue);
  padding: 10px 0;
  border-bottom: 1px solid #ddd;
}
.subject-section li { margin: 6px 0; }
.delete-btn {
  margin-left: 10px;
  color: red;
  cursor: pointer;
  border: none;
  background: none;
}
#login-trigger {
  position: fixed;
  bottom: 25px;
  right: 25px;
  background: var(--oracle-red);
  color: white;
  padding: 12px 18px;
  border-radius: 50px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 4px 12px rgba(235,16,0,0.4);
  transition: background 0.2s;
  z-index: 100;
}
#login-trigger:hover { background: #c50e00; }
#admin-toolbar {
  position: fixed;
  bottom: 80px;
  right: 25px;
  display: none;
  z-index: 100;
}
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 1000;
  justify-content: center;
  align-items: center;
}
.modal-overlay.active { display: flex; }
.modal-box {
  background: white;
  border-radius: 10px;
  width: 100%;
  max-width: 420px;
  padding: 30px 30px 24px;
  position: relative;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}
.modal-close {
  position: absolute;
  top: 14px;
  right: 16px;
  background: none;
  border: none;
  font-size: 20px;
  color: #999;
  cursor: pointer;
  line-height: 1;
}
.modal-close:hover { color: #333; }
.modal-title {
  font-size: 22px;
  font-weight: 700;
  color: #1a1a1a;
  margin: 0 0 22px 0;
}
.modal-input {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid #d0d5dd;
  border-radius: 6px;
  font-size: 14px;
  color: #333;
  margin-bottom: 12px;
  box-sizing: border-box;
  outline: none;
  transition: border-color 0.2s;
}
.modal-input:focus { border-color: var(--oracle-blue); }
.modal-error {
  color: var(--oracle-red);
  font-size: 13px;
  margin-bottom: 10px;
  min-height: 18px;
  line-height: 1.4;
}
.modal-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 6px;
  background: var(--oracle-red);
  color: white;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-bottom: 10px;
  transition: background 0.2s;
}
.modal-btn:hover { background: #c50e00; }
.modal-btn:disabled { background: #f08080; cursor: not-allowed; }
</style>
</head>

<body>

<header class="header">
  <div class="header-left">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/50/Oracle_logo.svg" class="oracle-logo" alt="Oracle">
    <h1 class="header-title">How can we help you today?</h1>
  </div>
  <div class="search-wrapper">
    <i class="fas fa-search search-icon"></i>
    <input type="text" id="searchBar" placeholder="Search...">
  </div>
</header>

<button id="login-trigger">
  <i class="fas fa-user-shield"></i> ADMIN LOGIN
</button>

<div id="admin-toolbar">
  <button onclick="uploadFile()" style="padding:10px 16px;background:black;color:white;border:none;border-radius:20px;cursor:pointer;">
    + Upload
  </button>
</div>

<!-- LOGIN MODAL -->
<div class="modal-overlay" id="login-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h2 class="modal-title">Login</h2>
    <div id="modal-logged-out">
      <input class="modal-input" type="email" id="modal-email" placeholder="Email" autocomplete="email">
      <input class="modal-input" type="password" id="modal-password" placeholder="Password" autocomplete="current-password">
      <div class="modal-error" id="modal-error"></div>
      <button class="modal-btn" id="modal-login-btn" onclick="doLogin()">Login</button>
    </div>
    <div id="modal-logged-in" style="display:none;">
      <button class="modal-btn" onclick="doLogout()">Logout</button>
      <button class="modal-btn" onclick="showChangePassword()">Change Password</button>
    </div>
  </div>
</div>

<!-- CHANGE PASSWORD MODAL -->
<div class="modal-overlay" id="change-password-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeChangePassword()">&times;</button>
    <h2 class="modal-title">Change Password</h2>
    <input class="modal-input" type="password" id="new-password" placeholder="New Password">
    <input class="modal-input" type="password" id="confirm-password" placeholder="Confirm New Password">
    <div class="modal-error" id="change-pw-error"></div>
    <button class="modal-btn" onclick="doChangePassword()">Update Password</button>
  </div>
</div>

<main class="container" id="accordion-container">
  <div class="card">
    <button class="card-header"><span><i class="fas fa-book"></i> Working Instructions</span><i class="fas fa-caret-down arrow"></i></button>
    <div class="card-body" id="body-Working-Instructions"></div>
  </div>
  <div class="card">
    <button class="card-header"><span><i class="fas fa-file-alt"></i> Standard Operating Procedures</span><i class="fas fa-caret-down arrow"></i></button>
    <div class="card-body" id="body-Standard-Operating-Procedures"></div>
  </div>
  <div class="card">
    <button class="card-header"><span><i class="fas fa-layer-group"></i> Functional Specifications</span><i class="fas fa-caret-down arrow"></i></button>
    <div class="card-body" id="body-Functional-Specifications"></div>
  </div>
  <div class="card">
    <button class="card-header"><span><i class="fas fa-file"></i> Templates</span><i class="fas fa-caret-down arrow"></i></button>
    <div class="card-body" id="body-Templates"></div>
  </div>
</main>

<script>
const firebaseConfig = {
  apiKey:            "AIzaSyCA57BpptByKfLX1ykKjpwnq_Og1EsJAXM",
  authDomain:        "my-first-firebase-f6ec0.firebaseapp.com",
  databaseURL:       "https://my-first-firebase-f6ec0-default-rtdb.firebaseio.com",
  projectId:         "my-first-firebase-f6ec0",
  storageBucket:     "my-first-firebase-f6ec0.firebasestorage.app",
  messagingSenderId: "9863151599",
  appId:             "1:9863151599:web:ca3ff5c66228369041801a",
  measurementId:     "G-E9GCVJQF71"
};

function friendlyError(e) {
  const code = e.code || '';
  const msg  = e.message || '';
  if (code === 'auth/invalid-api-key' || msg.includes('API key not valid') || msg.trim().startsWith('{'))
    return 'Configuration error. Please contact your administrator.';
  if (code === 'auth/user-not-found' || code === 'auth/wrong-password' || code === 'auth/invalid-credential')
    return 'Incorrect email or password.';
  if (code === 'auth/invalid-email')
    return 'Please enter a valid email address.';
  if (code === 'auth/too-many-requests')
    return 'Too many failed attempts. Please wait and try again later.';
  if (code === 'auth/user-disabled')
    return 'This account has been disabled. Contact your administrator.';
  if (code === 'auth/network-request-failed')
    return 'Network error. Please check your internet connection.';
  if (code === 'auth/requires-recent-login')
    return 'Please log out and log back in before changing your password.';
  return 'Something went wrong. Please try again.';
}

let auth, db, storage, firebaseReady = false;
try {
  firebase.initializeApp(firebaseConfig);
  auth    = firebase.auth();
  db      = firebase.database();
  storage = firebase.storage();
  firebaseReady = true;
} catch(err) {
  console.error("Firebase init error:", err.message);
}

function openModal() {
  document.getElementById('login-modal').classList.add('active');
  document.getElementById('modal-error').textContent = '';
  document.getElementById('modal-email').value = '';
  document.getElementById('modal-password').value = '';
}
function closeModal() {
  document.getElementById('login-modal').classList.remove('active');
}
function showChangePassword() {
  closeModal();
  document.getElementById('change-pw-error').textContent = '';
  document.getElementById('new-password').value = '';
  document.getElementById('confirm-password').value = '';
  document.getElementById('change-password-modal').classList.add('active');
}
function closeChangePassword() {
  document.getElementById('change-password-modal').classList.remove('active');
}

document.getElementById('login-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.getElementById('change-password-modal').addEventListener('click', function(e) {
  if (e.target === this) closeChangePassword();
});

document.getElementById('login-trigger').onclick = () => openModal();

function doLogin() {
  const errEl = document.getElementById('modal-error');
  if (!firebaseReady) {
    errEl.textContent = 'System is not configured. Please contact your administrator.';
    return;
  }
  const email = document.getElementById('modal-email').value.trim();
  const pass  = document.getElementById('modal-password').value;
  if (!email || !pass) { errEl.textContent = 'Please enter your email and password.'; return; }

  const btn = document.getElementById('modal-login-btn');
  btn.disabled = true;
  btn.textContent = 'Logging in...';
  errEl.textContent = '';

  auth.signInWithEmailAndPassword(email, pass)
    .then(() => closeModal())
    .catch(e  => { errEl.textContent = friendlyError(e); })
    .finally(() => { btn.disabled = false; btn.textContent = 'Login'; });
}

document.getElementById('modal-email').addEventListener('keydown',    e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('modal-password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function doLogout() {
  if (!firebaseReady) return;
  auth.signOut().then(() => closeModal());
}

function doChangePassword() {
  const errEl   = document.getElementById('change-pw-error');
  const newPass  = document.getElementById('new-password').value;
  const confPass = document.getElementById('confirm-password').value;
  if (!newPass || !confPass)  { errEl.textContent = 'Please fill in both fields.'; return; }
  if (newPass !== confPass)   { errEl.textContent = 'Passwords do not match.'; return; }
  if (newPass.length < 6)     { errEl.textContent = 'Password must be at least 6 characters.'; return; }
  errEl.textContent = '';
  auth.currentUser.updatePassword(newPass)
    .then(() => { closeChangePassword(); alert('Password updated successfully.'); })
    .catch(e  => { errEl.textContent = friendlyError(e); });
}

if (firebaseReady) {
  auth.onAuthStateChanged(user => {
    document.getElementById('admin-toolbar').style.display = user ? 'block' : 'none';
    document.getElementById('login-trigger').innerHTML = user
      ? '<i class="fas fa-user-shield"></i> ADMIN'
      : '<i class="fas fa-user-shield"></i> ADMIN LOGIN';
    document.getElementById('modal-logged-out').style.display = user ? 'none'  : 'block';
    document.getElementById('modal-logged-in').style.display  = user ? 'block' : 'none';
  });
}

function uploadFile() {
  if (!firebaseReady) return;
  const cat   = prompt('Category:');  if (!cat) return;
  const sub   = prompt('Subject:');   if (!sub) return;
  const input = document.createElement('input');
  input.type  = 'file';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    storage.ref('docs/' + Date.now() + '_' + file.name).put(file)
      .then(s => s.ref.getDownloadURL())
      .then(url => db.ref('files').push({ category: cat, subject: sub, name: file.name, url }));
  };
  input.click();
}

function deleteFile(id) {
  if (!firebaseReady) return;
  if (confirm('Delete this file?')) db.ref('files/' + id).remove();
}

if (firebaseReady) {
  db.ref('files').on('value', snap => {
    document.querySelectorAll('.card-body').forEach(b => b.innerHTML = '');
    snap.forEach(c => {
      const d = c.val(), id = c.key;
      const parent = document.getElementById('body-' + d.category.replace(/\s+/g, '-'));
      if (!parent) return;
      let block = parent.querySelector(`[data-sub="${d.subject}"]`);
      if (!block) {
        block = document.createElement('div');
        block.className = 'subject-section';
        block.setAttribute('data-sub', d.subject);
        block.innerHTML = `<div>${d.subject}</div><ul></ul>`;
        parent.appendChild(block);
      }
      const li = document.createElement('li');
      li.innerHTML = `<a href="${d.url}" target="_blank" rel="noreferrer">${d.name}</a>`
        + (auth.currentUser ? ` <button class="delete-btn" onclick="deleteFile('${id}')">Delete</button>` : '');
      block.querySelector('ul').appendChild(li);
    });
  });
}

document.getElementById('accordion-container').addEventListener('click', e => {
  const h = e.target.closest('.card-header');
  if (!h) return;
  const b = h.nextElementSibling;
  const open = b.style.display === 'block';
  b.style.display = open ? 'none' : 'block';
  h.querySelector('.arrow').style.transform = open ? 'rotate(0)' : 'rotate(180deg)';
});

document.getElementById('searchBar').onkeyup = function() {
  const q = this.value.toLowerCase();
  document.querySelectorAll('.card').forEach(c => {
    c.style.display = c.innerText.toLowerCase().includes(q) ? 'block' : 'none';
  });
};
</script>

</body>
</html>
