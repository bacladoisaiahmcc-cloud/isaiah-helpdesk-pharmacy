<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oracle Pharmacy Helpdesk</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    :root { --oracle-blue: #234e70; --oracle-red: #f80000; --bg: #f4f7f9; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background-color: var(--bg); color: #333; }

    /* HEADER */
    .header { 
      background-color: var(--oracle-blue); 
      color: white; 
      padding: 30px 8%; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      border-bottom: 5px solid var(--oracle-red);
      position: sticky; top: 0; z-index: 1000;
    }
    .header-left { display: flex; flex-direction: column; gap: 4px; }
    .oracle-logo { height: 24px; filter: brightness(0) invert(1); }
    .header-title { font-size: 26px; font-weight: 300; margin: 0; opacity: 0.9; }

    .header-right { display: flex; align-items: center; gap: 20px; }
    .search-wrapper { position: relative; width: 350px; }
    
    /* CLEAN SEARCH BAR FIX */
    .search-wrapper input { 
      width: 100%; padding: 12px 15px 12px 42px; 
      border-radius: 6px; border: none; outline: none; font-size: 14px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .search-icon { position: absolute; left: 14px; top: 14px; color: #888; }
    
    /* LOGIN ICON */
    #login-trigger { 
      font-size: 32px; 
      cursor: pointer; 
      color: white; 
      transition: 0.3s ease;
    }
    #login-trigger:hover { color: #ccc; transform: scale(1.1); }

    /* CONTENT SECTION */
    .container { max-width: 950px; margin: 40px auto; padding: 0 20px; min-height: 60vh; }
    .card { background: white; border-radius: 10px; margin-bottom: 15px; border: 1px solid #e0e0e0; box-shadow: 0 3px 10px rgba(0,0,0,0.05); overflow: hidden; }
    .card-header { 
      width: 100%; padding: 22px 25px; display: flex; justify-content: space-between; 
      align-items: center; cursor: pointer; border: none; background: none; 
      font-size: 17px; font-weight: 600; color: var(--oracle-blue); text-align: left;
    }
    .card-header:hover { background: #fafafa; }
    .card-body { display: none; padding: 0 25px 25px 65px; border-top: 1px solid #f0f0f0; background: #fdfdfd; }

    /* FILE LISTING */
    .subject-section { margin-top: 15px; border-bottom: 1px solid #eee; }
    .subject-header { font-weight: bold; color: #555; padding: 12px 0; cursor: pointer; display: flex; justify-content: space-between; }
    .file-list { list-style: none; padding: 10px 0 15px 20px; margin: 0; display: none; }
    .file-list li { margin-bottom: 12px; }
    .file-list a { color: #0056b3; text-decoration: none; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 10px; }
    .file-list a:hover { color: var(--oracle-red); text-decoration: underline; }

    /* MODALS */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(4px); }
    .modal-box { background: white; padding: 40px; border-radius: 12px; width: 380px; position: relative; box-shadow: 0 15px 40px rgba(0,0,0,0.3); }
    .close-modal { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; color: #bbb; border: none; background: none; }
    .input-field { width: 100%; padding: 14px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
    .btn-main { width: 100%; padding: 15px; background: var(--oracle-blue); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; }
    .btn-main:hover { background: #1a3a54; }

    /* FLOATING ADMIN TOOLBAR */
    #admin-toolbar { position: fixed; bottom: 30px; left: 30px; display: none; z-index: 1000; }
    .btn-admin { background: #222; color: white; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.4); font-size: 14px; }
  </style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/50/Oracle_logo.svg" class="oracle-logo" alt="Oracle Logo">
    <h1 class="header-title">How can we help you today?</h1>
  </div>
  <div class="header-right">
    <div class="search-wrapper">
      <i class="fas fa-search search-icon"></i>
      <input type="text" id="searchBar" placeholder="Search files, SOPs, or guides...">
    </div>
    <i id="login-trigger" class="fas fa-user-circle" title="Admin Login"></i>
  </div>
</header>

<main class="container" id="accordion-container">
  <div class="card">
    <button class="card-header"><span><i class="fas fa-info-circle"></i> Working Instructions</span> <i class="fas fa-chevron-down arrow"></i></button>
    <div class="card-body" id="body-Working-Instructions"></div>
  </div>
  <div class="card">
    <button class="card-header"><span><i class="fas fa-clipboard-list"></i> Standard Operating Procedures</span> <i class="fas fa-chevron-down arrow"></i></button>
    <div class="card-body" id="body-Standard-Operating-Procedures"></div>
  </div>
  <div class="card">
    <button class="card-header"><span><i class="fas fa-project-diagram"></i> Functional Specifications</span> <i class="fas fa-chevron-down arrow"></i></button>
    <div class="card-body" id="body-Functional-Specifications"></div>
  </div>
  <div class="card">
    <button class="card-header"><span><i class="fas fa-file-invoice"></i> Templates</span> <i class="fas fa-chevron-down arrow"></i></button>
    <div class="card-body" id="body-Templates"></div>
  </div>
</main>

<div id="loginModal" class="modal-overlay">
  <div class="modal-box">
    <button class="close-modal">&times;</button>
    <div id="login-view">
      <h2 style="text-align:center; color: var(--oracle-blue); margin-bottom: 25px;">Admin Login</h2>
      <input type="email" id="loginEmail" class="input-field" placeholder="Email Address">
      <input type="password" id="loginPass" class="input-field" placeholder="Password">
      <button id="doLogin" class="btn-main">Sign In</button>
      <p id="loginError" style="color:red; font-size:12px; text-align:center; margin-top:15px;"></p>
    </div>
    <div id="profile-view" style="display:none; text-align:center;">
      <h2 style="color: var(--oracle-blue)">Logged In</h2>
      <p id="userMail" style="font-weight:bold; color:#666; margin-bottom: 20px;"></p>
      <button id="doLogout" class="btn-main" style="background:var(--oracle-red)">Sign Out</button>
    </div>
  </div>
</div>

<div id="uploadModal" class="modal-overlay">
  <div class="modal-box">
    <button class="close-modal">&times;</button>
    <h2 style="color: var(--oracle-blue); margin-bottom: 20px;">Upload Document</h2>
    <label style="font-size: 12px; font-weight: bold; color: #666;">Category</label>
    <select id="upCat" class="input-field">
      <option>Working Instructions</option>
      <option>Standard Operating Procedures</option>
      <option>Functional Specifications</option>
      <option>Templates</option>
    </select>
    <input type="text" id="upSub" class="input-field" placeholder="Subject Name (e.g. Accounts Payable)">
    <input type="file" id="upFile" class="input-field">
    <button id="doUpload" class="btn-main">Upload to Server</button>
    <p id="upStatus" style="text-align:center; margin-top:15px; font-size:12px; font-weight: bold;"></p>
  </div>
</div>

<div id="admin-toolbar">
  <button class="btn-admin" onclick="document.getElementById('uploadModal').style.display='flex'">
    <i class="fas fa-plus"></i> Add New Document
  </button>
</div>

<script>
  // 1. Firebase Config
  const firebaseConfig = {
    apiKey: "AIzaSyBaSuFhNUeghfXEznYCHxYnagkjiojfO_M",
    authDomain: "helpdeskrpharmacy.firebaseapp.com",
    databaseURL: "https://helpdeskrpharmacy-default-rtdb.firebaseio.com",
    projectId: "helpdeskrpharmacy",
    storageBucket: "helpdeskrpharmacy.appspot.com",
    messagingSenderId: "776189919696",
    appId: "1:776189919696:web:ab3be5e265dbfff8faf9d5"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth(), db = firebase.database(), storage = firebase.storage();

  // 2. Navigation & Modal Controls
  const closeAll = () => document.querySelectorAll('.modal-overlay').forEach(m => m.style.display='none');
  document.querySelectorAll('.close-modal').forEach(b => b.onclick = closeAll);
  document.getElementById('login-trigger').onclick = () => document.getElementById('loginModal').style.display='flex';

  // 3. Admin Authentication
  document.getElementById('doLogin').onclick = () => {
    const email = document.getElementById('loginEmail').value;
    const pass = document.getElementById('loginPass').value;
    auth.signInWithEmailAndPassword(email, pass)
      .then(closeAll)
      .catch(e => document.getElementById('loginError').innerText = e.message);
  };
  document.getElementById('doLogout').onclick = () => auth.signOut().then(closeAll);

  auth.onAuthStateChanged(user => {
    document.getElementById('admin-toolbar').style.display = user ? 'block' : 'none';
    document.getElementById('login-view').style.display = user ? 'none' : 'block';
    document.getElementById('profile-view').style.display = user ? 'block' : 'none';
    if(user) document.getElementById('userMail').innerText = user.email;
  });

  // 4. Admin Upload Function
  document.getElementById('doUpload').onclick = () => {
    const file = document.getElementById('upFile').files[0];
    const cat = document.getElementById('upCat').value;
    const sub = document.getElementById('upSub').value;
    const status = document.getElementById('upStatus');

    if(!file || !sub) return alert("Please fill all fields and select a file.");
    
    status.style.color = "blue";
    status.innerText = "Uploading... Please wait.";

    const storageRef = storage.ref('docs/' + Date.now() + "_" + file.name);
    storageRef.put(file).then(snapshot => snapshot.ref.getDownloadURL()).then(url => {
      db.ref('files').push({
        category: cat,
        subject: sub,
        name: file.name,
        url: url
      });
      status.style.color = "green";
      status.innerText = "Upload successful!";
      setTimeout(() => { closeAll(); status.innerText = ""; document.getElementById('upFile').value = ""; }, 1500);
    }).catch(err => {
      status.style.color = "red";
      status.innerText = "Error: " + err.message;
    });
  };

  // 5. Data Retrieval & Real-time Update
  db.ref('files').on('value', snap => {
    document.querySelectorAll('.card-body').forEach(b => b.innerHTML = '');
    snap.forEach(child => {
      const data = child.val();
      const parentId = 'body-' + data.category.replace(/\s+/g, '-');
      const parent = document.getElementById(parentId);
      
      if(parent) {
        let block = parent.querySelector(`[data-sub="${data.subject}"]`);
        if(!block) {
          block = document.createElement('div');
          block.className = 'subject-section';
          block.setAttribute('data-sub', data.subject);
          block.innerHTML = `<div class="subject-header">${data.subject} <i class="fas fa-chevron-down"></i></div><ul class="file-list"></ul>`;
          parent.appendChild(block);
        }
        const li = document.createElement('li');
        li.innerHTML = `<a href="${data.url}" target="_blank"><i class="far fa-file-pdf"></i> ${data.name}</a>`;
        block.querySelector('ul').appendChild(li);
      }
    });
  });

  // 6. Accordion & Subject Toggle Fix
  document.getElementById('accordion-container').addEventListener('click', (e) => {
    const head = e.target.closest('.card-header');
    if(head) {
      const body = head.nextElementSibling;
      const isOpen = body.style.display === 'block';
      body.style.display = isOpen ? 'none' : 'block';
      head.querySelector('.arrow').className = isOpen ? 'fas fa-chevron-down arrow' : 'fas fa-chevron-up arrow';
      return;
    }
    const subH = e.target.closest('.subject-header');
    if(subH) {
      const list = subH.nextElementSibling;
      list.style.display = (list.style.display === 'block') ? 'none' : 'block';
    }
  });

  // 7. Dynamic Search Functionality
  document.getElementById('searchBar').addEventListener('keyup', function() {
    const query = this.value.toLowerCase();
    document.querySelectorAll('.card').forEach(card => {
      const text = card.innerText.toLowerCase();
      card.style.display = text.includes(query) ? "block" : "none";
    });
  });
</script>
</body>
</html>
