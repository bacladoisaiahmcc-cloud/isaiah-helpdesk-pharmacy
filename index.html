<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helpdesk System</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* Basic Styling to match the UI layout */
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f4f4f9; }
        .header { background: #313131; color: white; padding: 20px; text-align: center; position: relative; }
        .oracle-image { width: 50px; }
        .search-wrapper { margin-top: 15px; position: relative; display: inline-block; width: 50%; }
        .form-input { width: 100%; padding: 10px 40px; border-radius: 20px; border: none; }
        .search-icon { position: absolute; left: 15px; top: 12px; color: #888; }
        #profile-icon { position: absolute; right: 30px; top: 30px; font-size: 24px; cursor: pointer; }
        
        .main-content { padding: 20px; max-width: 1000px; margin: auto; }
        .dropdown-card { background: white; margin-bottom: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow: hidden; }
        .dropdown-btn { padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: #fff; border-bottom: 1px solid #eee; }
        .topic-icon { width: 25px; margin-right: 10px; vertical-align: middle; }
        .dropdown-body { padding: 10px 20px; background: #fafafa; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal[hidden] { display: none; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; width: 400px; position: relative; }
        .modal-close { position: absolute; top: 10px; right: 10px; border: none; background: none; font-size: 20px; cursor: pointer; }
        
        .pdf-list { list-style: none; padding: 0; }
        .pdf-list li { margin: 10px 0; }
        .pdf-list a { color: #0066cc; text-decoration: none; }
        
        #left-buttons { position: fixed; bottom: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; }
        button { cursor: pointer; padding: 10px 15px; border-radius: 5px; border: none; background: #444; color: white; }
    </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="oracle-image-container">
        <img src="https://www.oracle.com/asset/main/shared-lib/dw-lib/img/oracle-logo.svg" alt="Oracle Logo" class="oracle-image">
      </div>
      <h2 class="help-text">How can we help you today?</h2>
      <div class="search-wrapper">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="searchInput" placeholder="Search..." class="form-input">
      </div>  
      <i id="profile-icon" class="fas fa-user-circle"></i>
    </div>
  </header>

  <main class="main-content">
    <div id="dynamic-accordion">
        <div class="dropdown-card">
            <div class="dropdown-btn">
                <div class="card-title"><span>Oracle Guides</span></div>
                <span class="arrow">▼</span>
            </div>
            <div class="dropdown-body">
                <ul class="pdf-list">
                    <li><a href="https://res.cloudinary.com/dkwkdsnk7/raw/upload/v1747790590/ORA-10-001_HOW_TO_LOG-IN_TO_ORACLE_1747790536384.pdf" target="_blank">ORA-10-001 HOW TO LOG-IN TO ORACLE</a></li>
                </ul>
            </div>
        </div>
    </div>
  </main>

  <div id="login-modal" class="modal" hidden>
    <div class="modal-content">
      <button class="modal-close">×</button>
      <h2 class="modal-title">Login</h2>
      <div id="login-error"></div>
      <input type="email" id="login-email" placeholder="Email" class="form-input" style="margin-bottom: 10px;">
      <input type="password" id="login-password" placeholder="Password" class="form-input" style="margin-bottom: 10px;">
      <button id="login-btn" style="width: 100%;">Login</button>
    </div>
  </div>

  <script>
    // 1. Firebase Configuration (From your file)
    const firebaseConfig = {
      apiKey: "AIzaSyBaSuFhNUeghfXEznYCHxYnagkjiojfO_M",
      authDomain: "helpdeskrpharmacy.firebaseapp.com",
      databaseURL: "https://helpdeskrpharmacy-default-rtdb.firebaseio.com",
      projectId: "helpdeskrpharmacy",
      storageBucket: "helpdeskrpharmacy.appspot.com",
      messagingSenderId: "776189919696",
      appId: "1:776189919696:web:ab3be5e265dbfff8faf9d5"
    };
    
    firebase.initializeApp(firebaseConfig);

    // 2. Simple UI Logic
    const profileIcon = document.getElementById('profile-icon');
    const loginModal = document.getElementById('login-modal');
    const closeBtn = document.querySelector('.modal-close');

    profileIcon.onclick = () => loginModal.hidden = false;
    closeBtn.onclick = () => loginModal.hidden = true;

    // Accordion Logic
    document.querySelectorAll('.dropdown-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const body = btn.nextElementSibling;
            body.style.display = body.style.display === 'none' ? 'block' : 'none';
        });
    });

    // 3. Search Logic
    function searchContent() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let cards = document.querySelectorAll('.dropdown-card');
        cards.forEach(card => {
            let text = card.textContent.toLowerCase();
            card.style.display = text.includes(input) ? '' : 'none';
        });
    }
    document.getElementById('searchInput').addEventListener('keyup', searchContent);
  </script>
</body>
</html>
